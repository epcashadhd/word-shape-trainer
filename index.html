    <script>
        // --- LOGIC & HELPERS ---
        
        const LEVELS = {
            ASCENDER: 0,
            X_HEIGHT: 25,
            BASELINE: 60,
            DESCENDER: 85
        };

        const CHAR_WIDTH = 40;
        const PADDING = 10;

        function getLetterType(char) {
            const c = char.toLowerCase();
            if ('bdfhklt'.includes(c)) return 'tall';
            if ('gjpqy'.includes(c)) return 'low';
            return 'short';
        }

        function getOutlineTopY(type) { return type === 'tall' ? LEVELS.ASCENDER : LEVELS.X_HEIGHT; }
        function getOutlineBottomY(type) { return type === 'low' ? LEVELS.DESCENDER : LEVELS.BASELINE; }

        function generatePath(word) {
            const chars = word.split('');
            if (chars.length === 0) return '';

            const tops = chars.map(c => getOutlineTopY(getLetterType(c)));
            const bottoms = chars.map(c => getOutlineBottomY(getLetterType(c)));
            const n = chars.length;

            let path = `M 0 ${bottoms[0]} L 0 ${tops[0]}`; 

            // Roof
            for (let i = 0; i < n; i++) {
                path += ` L ${(i + 1) * CHAR_WIDTH} ${tops[i]}`;
                if (i < n - 1 && tops[i] !== tops[i+1]) {
                    path += ` L ${(i + 1) * CHAR_WIDTH} ${tops[i+1]}`;
                }
            }
            // Wall
            path += ` L ${n * CHAR_WIDTH} ${bottoms[n - 1]}`;
            // Floor
            for (let i = n - 1; i >= 0; i--) {
                path += ` L ${i * CHAR_WIDTH} ${bottoms[i]}`;
                if (i > 0 && bottoms[i] !== bottoms[i-1]) {
                    path += ` L ${i * CHAR_WIDTH} ${bottoms[i-1]}`;
                }
            }
            path += ' Z';
            return path;
        }

        // --- GLOBAL DOWNLOAD FUNCTION ---
        function downloadOffline() {
            const htmlContent = document.documentElement.outerHTML;
            const blob = new Blob([htmlContent], { type: 'text/html' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'word-shape-trainer-offline.html';
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
        }

        // --- APP CLASS ---

        class WordTrainerApp {
            constructor() {
                this.words = [
                    "badminton", "foot", "apple", "giraffe", "elephant", "hippopotamus"
                ];
                this.inputText = this.words.join('\n');
                this.mode = 'play'; // 'edit' or 'play'
                this.container = document.getElementById('app-container');
                
                // State for cards: { [word]: { revealed: 0, guess: '' } }
                this.cardState = {};
                
                this.render();
            }

            setMode(newMode) {
                this.mode = newMode;
                document.getElementById('nav-edit').className = `btn-nav ${this.mode === 'edit' ? 'active' : ''}`;
                document.getElementById('nav-play').className = `btn-nav ${this.mode === 'play' ? 'active' : ''}`;
                this.render();
            }

            updateWordsFromInput(text) {
                this.inputText = text;
                this.words = text.split('\n')
                    .map(w => w.trim())
                    .filter(w => w.length > 0 && /^[a-zA-Z]+$/.test(w));
            }

            // Card Interactions
            getCardState(word) {
                if (!this.cardState[word]) {
                    this.cardState[word] = { revealed: 0, guess: '' };
                }
                return this.cardState[word];
            }

            handleInput(word, val, inputEl, cardEl, svgContainer) {
                const state = this.getCardState(word);
                if (val.length <= word.length) {
                    state.guess = val;
                } else {
                    inputEl.value = state.guess; // Revert
                }
                this.updateCardUI(word, inputEl, cardEl, svgContainer);
            }

            handleHint(word, inputEl, cardEl, svgContainer) {
                const state = this.getCardState(word);
                if (state.revealed < word.length) {
                    state.revealed++;
                    this.updateCardUI(word, inputEl, cardEl, svgContainer);
                    inputEl.focus();
                }
            }

            handleShow(word, inputEl, cardEl, svgContainer) {
                const state = this.getCardState(word);
                state.revealed = word.length;
                state.guess = word;
                inputEl.value = word;
                this.updateCardUI(word, inputEl, cardEl, svgContainer);
            }

            handleReset(word, inputEl, cardEl, svgContainer) {
                const state = this.getCardState(word);
                state.revealed = 0;
                state.guess = '';
                inputEl.value = '';
                this.updateCardUI(word, inputEl, cardEl, svgContainer);
                setTimeout(() => inputEl.focus(), 50);
            }

            // The core render logic for a single card's SVG text
            updateCardUI(word, inputEl, cardEl, svgContainer) {
                const state = this.getCardState(word);
                const isCorrect = state.guess.toLowerCase() === word.toLowerCase();
                
                // Update Card Style
                if (isCorrect) {
                    cardEl.classList.add('correct');
                } else {
                    cardEl.classList.remove('correct');
                }

                // Re-render SVG Letters
                // We clear just the letters group
                let letterGroup = svgContainer.querySelector('.letters-group');
                if (!letterGroup) return; // Should not happen

                // Clear existing
                letterGroup.innerHTML = '';

                word.split('').forEach((correctChar, idx) => {
                    const isRevealed = idx < state.revealed;
                    const userChar = state.guess[idx] || '';
                    
                    let displayChar = '';
                    let fill = '#334155'; // Dark grey

                    if (isRevealed) {
                        displayChar = correctChar;
                        fill = '#2563eb'; // Blue hint
                    } else if (userChar) {
                        displayChar = userChar;
                        const isMatch = userChar.toLowerCase() === correctChar.toLowerCase();
                        fill = isMatch ? '#334155' : '#ef4444'; // Red if wrong
                    }

                    if (displayChar) {
                        const text = document.createElementNS("http://www.w3.org/2000/svg", "text");
                        text.setAttribute('x', idx * CHAR_WIDTH + (CHAR_WIDTH/2));
                        text.setAttribute('y', LEVELS.BASELINE - 8);
                        text.setAttribute('text-anchor', 'middle');
                        text.setAttribute('font-size', '32');
                        text.setAttribute('font-family', 'monospace');
                        text.setAttribute('fill', fill);
                        text.setAttribute('font-weight', 'bold');
                        text.style.pointerEvents = 'none';
                        text.textContent = displayChar;
                        letterGroup.appendChild(text);
                    }
                });
            }

            render() {
                this.container.innerHTML = '';

                if (this.mode === 'edit') {
                    // --- RENDER EDITOR ---
                    const wrapper = document.createElement('div');
                    wrapper.className = 'editor-container';
                    wrapper.innerHTML = `
                        <div class="editor-header">
                            <h2 style="margin:0; font-size:1.1rem">Vocabulary List</h2>
                            <p style="margin:5px 0 0; color:var(--text-muted); font-size:0.9rem">One word per line. Letters only.</p>
                        </div>
                        <textarea id="vocab-input" spellcheck="false">${this.inputText}</textarea>
                        <div class="editor-footer">
                            <span id="word-count" style="color:var(--text-muted); font-size:0.9rem">${this.words.length} valid words</span>
                            <button class="btn-primary" id="btn-start">
                                <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="5 3 19 12 5 21 5 3"/></svg>
                                Start
                            </button>
                        </div>
                    `;
                    this.container.appendChild(wrapper);

                    // Editor events
                    const textarea = wrapper.querySelector('#vocab-input');
                    const countSpan = wrapper.querySelector('#word-count');
                    
                    textarea.addEventListener('input', (e) => {
                        this.updateWordsFromInput(e.target.value);
                        countSpan.textContent = `${this.words.length} valid words`;
                    });

                    wrapper.querySelector('#btn-start').addEventListener('click', () => {
                        this.setMode('play');
                    });

                } else {
                    // --- RENDER TRAINER ---
                    if (this.words.length === 0) {
                        this.container.innerHTML = `
                            <div class="empty-state">
                                <p>No words found.</p>
                                <button class="link-btn" onclick="app.setMode('edit')">Add some words</button>
                            </div>
                        `;
                        return;
                    }

                    this.words.forEach((word, index) => {
                        // Unique ID for this render cycle
                        const uid = `card-${index}-${word}`;
                        
                        const card = document.createElement('div');
                        card.className = 'card';
                        
                        // Dimensions
                        const svgWidth = word.length * CHAR_WIDTH + (PADDING * 2);
                        const svgHeight = LEVELS.DESCENDER + (PADDING * 2);
                        const pathData = generatePath(word);

                        // Generate Lines HTML
                        let linesHTML = '';
                        for(let i=0; i<word.length; i++) {
                            const x1 = i * CHAR_WIDTH + 5;
                            const x2 = (i+1) * CHAR_WIDTH - 5;
                            const y = LEVELS.BASELINE - 5;
                            linesHTML += `<line x1="${x1}" y1="${y}" x2="${x2}" y2="${y}" stroke="#cbd5e1" stroke-width="2" stroke-linecap="round" />`;
                        }

                        card.innerHTML = `
                            <div class="svg-wrapper">
                                <svg width="${svgWidth}" height="${svgHeight}" viewBox="-${PADDING} -10 ${svgWidth} ${svgHeight}" style="overflow:visible">
                                    <path d="${pathData}" fill="none" stroke="#ef4444" stroke-width="3" stroke-linejoin="round" stroke-linecap="round"/>
                                    ${linesHTML}
                                    <g class="letters-group"></g> <!-- Text injected here -->
                                </svg>
                            </div>

                            <div class="input-group">
                                <input type="text" class="game-input" 
                                    placeholder="TYPE HERE" 
                                    autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false"
                                >
                            </div>

                            <div class="controls">
                                <button class="btn-control btn-hint">
                                    <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
                                    Hint
                                </button>
                                <button class="btn-control btn-show">
                                    <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
                                    Show
                                </button>
                                <button class="btn-control btn-reset">
                                    <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 4v6h6"/><path d="M3.51 15a9 9 0 1 0 2.13-9.36L1 10"/></svg>
                                    Reset
                                </button>
                            </div>
                        `;

                        this.container.appendChild(card);

                        // Attach Listeners
                        const inputEl = card.querySelector('input');
                        const svgContainer = card.querySelector('svg');
                        
                        // Initialize UI state
                        const state = this.getCardState(word);
                        inputEl.value = state.guess; // Restore previous guess if any
                        this.updateCardUI(word, inputEl, card, svgContainer);

                        // Events
                        inputEl.addEventListener('input', (e) => this.handleInput(word, e.target.value, inputEl, card, svgContainer));
                        
                        card.querySelector('.btn-hint').addEventListener('click', () => this.handleHint(word, inputEl, card, svgContainer));
                        card.querySelector('.btn-show').addEventListener('click', () => this.handleShow(word, inputEl, card, svgContainer));
                        card.querySelector('.btn-reset').addEventListener('click', () => this.handleReset(word, inputEl, card, svgContainer));
                        
                        // Click SVG to focus
                        card.querySelector('.svg-wrapper').addEventListener('click', () => inputEl.focus());
                    });

                    // Scroll to top button
                    const topBtn = document.createElement('button');
                    topBtn.className = 'scroll-top';
                    topBtn.innerText = 'Back to Top';
                    topBtn.onclick = () => window.scrollTo({top:0, behavior:'smooth'});
                    this.container.appendChild(topBtn);
                }
            }
        }

        // Initialize
        const app = new WordTrainerApp();

    </script>

</body></html>
