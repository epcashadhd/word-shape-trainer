            'sandslash':  { body: '#E0C068', accent: '#8B4513', shape: 'cube', face: 'visor', features: ['spike'] },
            'sandshrew':  { body: '#E0C068', accent: '#222', shape: 'round', face: 'eye-std', features: [] },
            'seadra':     { body: '#6890F0', accent: '#F8D030', shape: 'round', face: 'visor', features: ['horn', 'spike'] },
            'wooper':     { body: '#6890F0', accent: '#3b4cca', shape: 'round', face: 'eye-std', features: ['antenna'] },
            'tentacool':  { body: '#6890F0', accent: '#F03030', shape: 'pyramid', face: 'cyclops', features: [] },
            'tentacruel': { body: '#6890F0', accent: '#F03030', shape: 'pyramid', face: 'cyclops', features: ['antenna'] },
            'default':    { body: '#FFCB05', accent: '#FF3A3A', shape: 'cube', face: 'eye-std', features: ['tail'] }
        };

        const RANDOM_PALETTES = [
            {b:'#ffcb05', a:'#ff3a3a'}, {b:'#78c850', a:'#3b6e2e'}, {b:'#f08030', a:'#f8d030'}, 
            {b:'#6890f0', a:'#98d8d8'}, {b:'#a8a878', a:'#705848'}, {b:'#a040a0', a:'#7038f8'}, 
            {b:'#f85888', a:'#f08030'}, {b:'#40e0d0', a:'#ff00ff'}, {b:'#e0c068', a:'#c03028'}
        ];
        const SHAPES = ['cube', 'round', 'pyramid', 'capsule', 'wide'];
        const FEATURES = ['ears-long', 'ears-cat', 'ears-round', 'wings', 'horn', 'leaf', 'antenna', 'spike', 'tail'];

        // --- HELPERS ---
        function getLetterType(char) {
            const c = char.toLowerCase();
            if ('bdfhklt'.includes(c)) return 'tall';
            if ('gjpqy'.includes(c)) return 'low';
            return 'short';
        }

        function getOutlineTopY(type) { return type === 'tall' ? LEVELS.ASCENDER : LEVELS.X_HEIGHT; }
        function getOutlineBottomY(type) { return type === 'low' ? LEVELS.DESCENDER : LEVELS.BASELINE; }

        function generatePath(word) {
            const chars = word.split('');
            if (chars.length === 0) return '';
            const tops = chars.map(c => getOutlineTopY(getLetterType(c)));
            const bottoms = chars.map(c => getOutlineBottomY(getLetterType(c)));
            const n = chars.length;

            let path = `M 0 ${bottoms[0]} L 0 ${tops[0]}`; 
            for (let i = 0; i < n; i++) {
                path += ` L ${(i + 1) * CHAR_WIDTH} ${tops[i]}`;
                if (i < n - 1 && tops[i] !== tops[i+1]) {
                    path += ` L ${(i + 1) * CHAR_WIDTH} ${tops[i+1]}`;
                }
            }
            path += ` L ${n * CHAR_WIDTH} ${bottoms[n - 1]}`;
            for (let i = n - 1; i >= 0; i--) {
                path += ` L ${i * CHAR_WIDTH} ${bottoms[i]}`;
                if (i > 0 && bottoms[i] !== bottoms[i-1]) {
                    path += ` L ${i * CHAR_WIDTH} ${bottoms[i-1]}`;
                }
            }
            path += ' Z';
            return path;
        }

        function downloadOffline() {
            const htmlContent = document.documentElement.outerHTML;
            const blob = new Blob([htmlContent], { type: 'text/html' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'Pokemon_Word_Trainer_v4.html';
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
        }

        // --- MONSTER GENERATOR ---
        function buildMonsterHTML(word) {
            const key = word.toLowerCase().trim();
            let config = MONSTER_DEX[key];

            // Random Generator for Unknown Words
            if (!config) {
                let sum = 0; for (let i = 0; i < key.length; i++) sum += key.charCodeAt(i);
                const pal = RANDOM_PALETTES[sum % RANDOM_PALETTES.length];
                const shp = SHAPES[sum % SHAPES.length];
                
                // Pick 1-2 random features based on hash
                const feats = [];
                const f1 = FEATURES[sum % FEATURES.length];
                feats.push(f1);
                if (sum % 2 === 0) {
                    const f2 = FEATURES[(sum + 3) % FEATURES.length];
                    if(f2 !== f1) feats.push(f2);
                }

                config = { body: pal.b, accent: pal.a, shape: shp, face: (sum % 3 === 0) ? 'cyclops' : 'eye-std', features: feats };
            }

            const style = `--m-body: ${config.body}; --m-accent: ${config.accent};`;
            const classes = `monster-container ${config.shape} ${config.face}`;
            
            let accessories = '';
            config.features.forEach(f => {
                if(f === 'ears-long') accessories += `<div class="feature-ears-long ear-L"></div><div class="feature-ears-long ear-R"></div>`;
                if(f === 'ears-cat') accessories += `<div class="feature-ears-cat ear-L"></div><div class="feature-ears-cat ear-R"></div>`;
                if(f === 'ears-round') accessories += `<div class="feature-ears-round ear-L"></div><div class="feature-ears-round ear-R"></div>`;
                if(f === 'wings') accessories += `<div class="feature-wings wing-L"></div><div class="feature-wings wing-R"></div>`;
                if(f === 'horn') accessories += `<div class="feature-horn"></div>`;
                if(f === 'spike') accessories += `<div class="feature-spike"></div><div class="feature-spike"></div>`;
                if(f === 'leaf') accessories += `<div class="feature-leaf"></div>`;
                if(f === 'antenna') accessories += `<div class="feature-antenna"></div>`;
                if(f === 'tail') accessories += `<div class="feature-tail"></div>`;
            });

            return `
                <div class="${classes}" style="${style}">
                    <div class="cube">
                        <div class="face front"><div class="eye-std"></div></div>
                        <div class="face back"></div>
                        <div class="face right"></div>
                        <div class="face left"></div>
                        <div class="face top"></div>
                        <div class="face bottom"></div>
                        ${accessories}
                    </div>
                </div>
            `;
        }

        // --- APP LOGIC ---
        class WordTrainerApp {
            constructor() {
                this.words = ["pikachu", "kakuna", "caterpie", "squirtle", "krabby", "tentacool"];
                this.inputText = this.words.join('\n');
                this.mode = 'play';
                this.container = document.getElementById('app-container');
                this.cardState = {}; 
                this.render();
            }

            setMode(newMode) {
                this.mode = newMode;
                document.getElementById('nav-edit').className = `btn-nav ${this.mode === 'edit' ? 'active' : ''}`;
                document.getElementById('nav-play').className = `btn-nav ${this.mode === 'play' ? 'active' : ''}`;
                this.render();
            }

            getCardState(word) {
                if (!this.cardState[word]) {
                    this.cardState[word] = { revealed: 0, guess: '' };
                }
                return this.cardState[word];
            }

            updateWordsFromInput(text) {
                this.inputText = text;
                this.words = text.split('\n').map(w => w.trim()).filter(w => w.length > 0 && /^[a-zA-Z]+$/.test(w));
            }

            render() {
                this.container.innerHTML = '';

                if (this.mode === 'edit') {
                    this.container.innerHTML = `
                        <div class="editor-container">
                            <div class="editor-header">SETUP BATTLE</div>
                            <textarea id="vocab-input" spellcheck="false">${this.inputText}</textarea>
                            <div class="editor-footer">
                                <span id="word-count">${this.words.length} Opponents</span>
                                <button class="btn-start" onclick="app.setMode('play')">START BATTLE</button>
                            </div>
                        </div>
                    `;
                    this.container.querySelector('textarea').addEventListener('input', (e) => {
                        this.updateWordsFromInput(e.target.value);
                        document.getElementById('word-count').innerText = `${this.words.length} Opponents`;
                    });

                } else {
                    if (this.words.length === 0) {
                        this.container.innerHTML = `<div style="text-align:center; padding:50px;">No Opponents Found.<br><button onclick="app.setMode('edit')">Add Words</button></div>`;
                        return;
                    }

                    this.words.forEach((word, index) => {
                        this.createBattleCard(word, index);
                    });
                    
                    const spacer = document.createElement('div');
                    spacer.style.height = '100px';
                    this.container.appendChild(spacer);
                }
            }

            createBattleCard(word, index) {
                const card = document.createElement('div');
                card.className = 'battle-card';
                
                const svgWidth = word.length * CHAR_WIDTH + (PADDING * 2);
                const svgHeight = LEVELS.DESCENDER + (PADDING * 2);
                const pathData = generatePath(word);

                const monsterHTML = buildMonsterHTML(word);

                let linesHTML = '';
                for(let i=0; i<word.length; i++) {
                    const x1 = i * CHAR_WIDTH + 5;
                    const x2 = (i+1) * CHAR_WIDTH - 5;
                    const y = LEVELS.BASELINE - 5;
                    linesHTML += `<line x1="${x1}" y1="${y}" x2="${x2}" y2="${y}" stroke="#cbd5e1" stroke-width="2" stroke-linecap="round" />`;
                }

                card.innerHTML = `
                    <div class="hp-bar-container">
                        <div class="hp-label">TARGET</div>
                        <div class="hp-track"><div class="hp-fill" style="width:0%"></div></div>
                    </div>

                    <div class="battle-scene">
                        <div class="word-shape-container">
                            <svg width="${svgWidth}" height="${svgHeight}" viewBox="-${PADDING} -10 ${svgWidth} ${svgHeight}" style="overflow:visible">
                                <path d="${pathData}" fill="none" stroke="#ff3a3a" stroke-width="3" stroke-linejoin="round" stroke-linecap="round"/>
                                ${linesHTML}
                                <g class="letters-group"></g>
                            </svg>
                        </div>
                    </div>

                    ${monsterHTML}

                    <div class="dialog-box">
                        <div class="dialog-inner">
                            <input type="text" class="game-input" placeholder="WHO'S THAT POKEMON?" 
                                autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false">
                            <div class="controls">
                                <button class="btn-game btn-hint">HINT</button>
                                <button class="btn-game btn-show">SHOW</button>
                                <button class="btn-game btn-reset">RESET</button>
                            </div>
                        </div>
                    </div>
                `;

                this.container.appendChild(card);

                const inputEl = card.querySelector('input');
                const svgContainer = card.querySelector('svg');
                const monsterEl = card.querySelector('.monster-container');
                const hpFill = card.querySelector('.hp-fill');
                
                const state = this.getCardState(word);
                inputEl.value = state.guess;
                this.updateUI(word, inputEl, card, svgContainer, monsterEl, hpFill);

                inputEl.addEventListener('input', (e) => this.handleInput(word, e.target.value, inputEl, card, svgContainer, monsterEl, hpFill));
                card.querySelector('.btn-hint').addEventListener('click', () => this.handleHint(word, inputEl, card, svgContainer, monsterEl, hpFill));
                card.querySelector('.btn-show').addEventListener('click', () => this.handleShow(word, inputEl, card, svgContainer, monsterEl, hpFill));
                card.querySelector('.btn-reset').addEventListener('click', () => this.handleReset(word, inputEl, card, svgContainer, monsterEl, hpFill));
            }

            handleInput(word, val, inputEl, cardEl, svgContainer, monsterEl, hpFill) {
                const state = this.getCardState(word);
                if (val.length <= word.length) {
                    state.guess = val;
                    if (val.length > 0) {
                        const lastIdx = val.length - 1;
                        if (val[lastIdx].toLowerCase() !== word[lastIdx].toLowerCase()) {
                            this.triggerAnim(monsterEl, 'wrong');
                        }
                    }
                } else {
                    inputEl.value = state.guess;
                }
                this.updateUI(word, inputEl, cardEl, svgContainer, monsterEl, hpFill);
            }

            handleHint(word, inputEl, cardEl, svgContainer, monsterEl, hpFill) {
                const state = this.getCardState(word);
                if (state.revealed < word.length) {
                    state.revealed++;
                    this.updateUI(word, inputEl, cardEl, svgContainer, monsterEl, hpFill);
                    inputEl.focus();
                }
            }

            handleShow(word, inputEl, cardEl, svgContainer, monsterEl, hpFill) {
                const state = this.getCardState(word);
                state.revealed = word.length;
                state.guess = word;
                inputEl.value = word;
                this.updateUI(word, inputEl, cardEl, svgContainer, monsterEl, hpFill);
            }

            handleReset(word, inputEl, cardEl, svgContainer, monsterEl, hpFill) {
                const state = this.getCardState(word);
                state.revealed = 0;
                state.guess = '';
                inputEl.value = '';
                this.updateUI(word, inputEl, cardEl, svgContainer, monsterEl, hpFill);
                setTimeout(() => inputEl.focus(), 50);
            }

            triggerAnim(el, className) {
                el.classList.remove(className);
                void el.offsetWidth; 
                el.classList.add(className);
                setTimeout(() => el.classList.remove(className), 1000);
            }

            updateUI(word, inputEl, cardEl, svgContainer, monsterEl, hpFill) {
                const state = this.getCardState(word);
                const isCorrect = state.guess.toLowerCase() === word.toLowerCase();
                
                if (isCorrect) {
                    if (!cardEl.classList.contains('correct')) {
                         this.triggerAnim(monsterEl, 'excited');
                    }
                    cardEl.classList.add('correct');
                    hpFill.style.width = '100%';
                } else {
                    cardEl.classList.remove('correct');
                    const progress = Math.min(100, (state.guess.length / word.length) * 100);
                    hpFill.style.width = `${progress}%`;
                }

                let letterGroup = svgContainer.querySelector('.letters-group');
                letterGroup.innerHTML = '';

                word.split('').forEach((correctChar, idx) => {
                    const isRevealed = idx < state.revealed;
                    const userChar = state.guess[idx] || '';
                    
                    let displayChar = '';
                    let fill = '#333'; 

                    if (isRevealed) {
                        displayChar = correctChar;
                        fill = '#3b4cca'; 
                    } else if (userChar) {
                        displayChar = userChar;
                        const isMatch = userChar.toLowerCase() === correctChar.toLowerCase();
                        fill = isMatch ? '#333' : '#ff3a3a'; 
                    }

                    if (displayChar) {
                        const text = document.createElementNS("http://www.w3.org/2000/svg", "text");
                        text.setAttribute('x', idx * CHAR_WIDTH + (CHAR_WIDTH/2));
                        text.setAttribute('y', LEVELS.BASELINE - 8);
                        text.setAttribute('text-anchor', 'middle');
                        text.setAttribute('font-size', '32');
                        text.setAttribute('font-family', 'Courier New');
                        text.setAttribute('fill', fill);
                        text.textContent = displayChar;
                        letterGroup.appendChild(text);
                    }
                });
            }
        }

        const app = new WordTrainerApp();
    </script>

</body></html>
